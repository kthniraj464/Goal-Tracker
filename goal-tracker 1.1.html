<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="theme-color" content="#ffffff">
  <title>Goal Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    :root {
      --ff-display: 'DM Serif Display', serif;
      --ff-body: 'DM Sans', sans-serif;
      --bg: #f5f5f3; --surface: #ffffff; --surface-2: #f0efeb;
      --text-primary: #1a1a18; --text-secondary: #888780;
      --border: rgba(0,0,0,0.1); --border-strong: rgba(0,0,0,0.2);
      --accent: #1a1a18; --done-bg: #e8f5e8; --done-text: #2e7d32;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #111110; --surface: #1c1c1a; --surface-2: #252523;
        --text-primary: #f0ede8; --text-secondary: #888780;
        --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.2);
        --accent: #f0ede8; --done-bg: #1a2e1a; --done-text: #81c784;
      }
    }
    html, body {
      font-family: var(--ff-body); background: var(--bg);
      min-height: 100vh; min-height: 100dvh;
      color: var(--text-primary); overflow-x: hidden;
    }
    .app-shell {
      width: 100%; max-width: 430px; margin: 0 auto;
      min-height: 100vh; min-height: 100dvh;
      background: var(--bg); display: flex; flex-direction: column;
      position: relative; overflow: hidden;
    }
    .status-bar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 14px 22px 6px; font-size: 12px; font-weight: 500;
      color: var(--text-secondary); flex-shrink: 0;
    }
    .home-screen { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .home-header {
      padding: 10px 20px 18px; display: flex;
      justify-content: space-between; align-items: center; flex-shrink: 0;
    }
    .home-header h1 {
      font-family: var(--ff-display); font-size: 28px;
      font-weight: 400; color: var(--text-primary);
    }
    .fab {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--accent); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; flex-shrink: 0; transition: opacity 0.15s;
    }
    .fab:active { opacity: 0.7; }
    .fab svg { stroke: var(--surface); }
    .goals-scroll {
      flex: 1; overflow-y: auto; padding: 0 16px 120px;
      display: flex; flex-direction: column; gap: 12px;
      -webkit-overflow-scrolling: touch;
    }
    .goals-scroll::-webkit-scrollbar { display: none; }
    .goal-card {
      background: var(--surface); border: 0.5px solid var(--border);
      border-radius: 18px; padding: 18px; cursor: pointer;
      transition: transform 0.1s; -webkit-user-select: none; user-select: none;
    }
    .goal-card:active { transform: scale(0.98); }
    .card-top {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 4px;
    }
    .card-exercise {
      font-family: var(--ff-display); font-size: 20px; font-weight: 400;
      color: var(--text-primary); line-height: 1.2; flex: 1; padding-right: 8px;
    }
    .card-badge {
      font-size: 11px; font-weight: 500; background: var(--surface-2);
      color: var(--text-secondary); border-radius: 20px;
      padding: 4px 10px; white-space: nowrap; flex-shrink: 0;
    }
    .card-badge.done { background: var(--done-bg); color: var(--done-text); }
    .card-deadline { font-size: 11px; color: var(--text-secondary); margin-bottom: 8px; }
    .card-deadline.overdue { color: #c0392b; }
    .card-nums { display: flex; align-items: baseline; gap: 4px; margin-bottom: 10px; }
    .card-cur { font-size: 30px; font-weight: 500; color: var(--text-primary); }
    .card-sep, .card-tot { font-size: 15px; color: var(--text-secondary); }
    .progress-track {
      height: 5px; background: var(--surface-2); border-radius: 3px;
      overflow: hidden; margin-bottom: 10px;
    }
    .progress-fill { height: 100%; border-radius: 3px; background: var(--accent); transition: width 0.4s ease; }
    .progress-fill.done { background: #4caf50; }
    .card-meta { font-size: 11px; color: var(--text-secondary); }
    .empty-state { text-align: center; padding: 80px 30px; color: var(--text-secondary); }
    .empty-state svg { display: block; margin: 0 auto 14px; opacity: 0.25; }
    .empty-state p { font-size: 15px; line-height: 1.7; }
    .empty-state strong { color: var(--text-primary); }
    .sheet-bg {
      position: fixed; inset: 0; background: rgba(0,0,0,0.45);
      z-index: 10; opacity: 0; pointer-events: none; transition: opacity 0.25s;
    }
    .sheet-bg.show { opacity: 1; pointer-events: all; }
    .sheet {
      position: fixed; bottom: 0; left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%; max-width: 430px; background: var(--surface);
      border-radius: 22px 22px 0 0; z-index: 20;
      transition: transform 0.32s cubic-bezier(0.32,0.72,0,1);
      max-height: 92vh; max-height: 92dvh; display: flex; flex-direction: column;
    }
    .sheet.show { transform: translateX(-50%) translateY(0); }
    .sheet-handle {
      width: 38px; height: 4px; background: var(--border-strong);
      border-radius: 2px; margin: 14px auto 0; flex-shrink: 0;
    }
    .sheet-inner {
      padding: 18px 22px 40px; overflow-y: auto; flex: 1;
      -webkit-overflow-scrolling: touch;
    }
    .sheet-inner::-webkit-scrollbar { display: none; }
    .sheet-title {
      font-family: var(--ff-display); font-size: 24px; font-weight: 400;
      color: var(--text-primary); margin-bottom: 20px;
    }
    .field { margin-bottom: 16px; }
    .field label {
      display: block; font-size: 12px; font-weight: 500;
      color: var(--text-secondary); margin-bottom: 6px;
      letter-spacing: 0.04em; text-transform: uppercase;
    }
    .field input, .field select {
      width: 100%; font-size: 16px; padding: 13px 14px;
      border: 0.5px solid var(--border-strong); border-radius: 12px;
      background: var(--surface-2); color: var(--text-primary);
      font-family: var(--ff-body); appearance: none; -webkit-appearance: none;
    }
    .field input:focus, .field select:focus { outline: none; border-color: var(--accent); }

    /* Unit pills */
    .unit-pills { display: flex; gap: 8px; }
    .unit-pill {
      flex: 1; padding: 12px 6px; text-align: center;
      font-size: 14px; font-weight: 500; font-family: var(--ff-body);
      border: 0.5px solid var(--border-strong); border-radius: 12px;
      background: var(--surface-2); color: var(--text-secondary);
      cursor: pointer; transition: background 0.15s, color 0.15s, border-color 0.15s;
    }
    .unit-pill.active {
      background: var(--accent); color: var(--surface); border-color: var(--accent);
    }

    .btn-row { display: flex; gap: 10px; margin-top: 22px; }
    .btn-row button {
      flex: 1; padding: 15px; font-family: var(--ff-body); font-size: 16px;
      font-weight: 500; border-radius: 14px; cursor: pointer; border: none; transition: opacity 0.15s;
    }
    .btn-row button:active { opacity: 0.75; }
    .btn-sec { background: var(--surface-2); color: var(--text-secondary); }
    .btn-pri { background: var(--accent); color: var(--surface); }

    /* Detail sheet */
    .detail-header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 18px; gap: 12px;
    }
    .detail-header h2 {
      font-family: var(--ff-display); font-size: 24px; font-weight: 400;
      color: var(--text-primary); line-height: 1.2; flex: 1;
    }
    .save-btn {
      background: var(--accent); color: var(--surface); border: none;
      border-radius: 12px; padding: 9px 18px; font-family: var(--ff-body);
      font-size: 14px; font-weight: 500; cursor: pointer; flex-shrink: 0; transition: opacity 0.15s;
    }
    .save-btn:active { opacity: 0.75; }
    .detail-progress {
      background: var(--surface-2); border-radius: 16px; padding: 18px; margin-bottom: 22px;
    }
    .d-nums { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; flex-wrap: wrap; }
    .d-cur { font-size: 40px; font-weight: 500; color: var(--text-primary); }
    .d-sep, .d-tot { font-size: 18px; color: var(--text-secondary); }
    .d-unit { font-size: 14px; color: var(--text-secondary); margin-left: 2px; }
    .d-pct { font-size: 12px; color: var(--text-secondary); margin-bottom: 4px; }
    .d-deadline { font-size: 12px; color: var(--text-secondary); margin-bottom: 10px; }
    .d-deadline.overdue { color: #c0392b; }
    .d-track { height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
    .d-fill { height: 100%; border-radius: 4px; background: var(--accent); transition: width 0.4s ease; }
    .d-fill.done { background: #4caf50; }
    .sec-label {
      font-size: 11px; font-weight: 500; color: var(--text-secondary);
      letter-spacing: 0.07em; text-transform: uppercase; margin-bottom: 12px;
    }
    .log-form { display: flex; flex-direction: column; gap: 10px; margin-bottom: 24px; }
    .log-form input {
      width: 100%; font-size: 16px; padding: 13px 14px;
      border: 0.5px solid var(--border-strong); border-radius: 12px;
      background: var(--surface-2); color: var(--text-primary); font-family: var(--ff-body);
    }
    .log-form input:focus { outline: none; border-color: var(--accent); }
    .log-add-btn {
      width: 100%; padding: 15px; background: var(--accent); color: var(--surface);
      border: none; border-radius: 14px; font-family: var(--ff-body);
      font-size: 16px; font-weight: 500; cursor: pointer; transition: opacity 0.15s;
    }
    .log-add-btn:active { opacity: 0.75; }
    .log-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
    .log-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 12px 14px; background: var(--surface-2); border-radius: 12px;
    }
    .log-item-left { display: flex; flex-direction: column; gap: 3px; }
    .log-reps { font-size: 15px; font-weight: 500; color: var(--text-primary); }
    .log-time { font-size: 11px; color: var(--text-secondary); }
    .log-del {
      background: none; border: none; font-size: 16px;
      color: var(--text-secondary); cursor: pointer; padding: 6px 8px; line-height: 1;
    }
    .no-logs { font-size: 13px; color: var(--text-secondary); padding: 6px 0; }
    .del-goal-btn {
      width: 100%; padding: 14px; background: none;
      border: 0.5px solid var(--border-strong); border-radius: 14px;
      color: var(--text-secondary); font-family: var(--ff-body);
      font-size: 14px; cursor: pointer; margin-top: 8px; transition: border-color 0.15s, color 0.15s;
    }
    .del-goal-btn:active { border-color: #e57373; color: #c0392b; }
  </style>
</head>
<body>
<div class="app-shell">
  <div class="status-bar">
    <span id="clock">9:41</span>
    <span>Goal Tracker</span>
    <span style="letter-spacing:2px;">···</span>
  </div>
  <div class="home-screen">
    <div class="home-header">
      <h1>My Goals</h1>
      <button class="fab" onclick="openNewSheet()" aria-label="New goal">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>
    </div>
    <div class="goals-scroll" id="goals-scroll"></div>
  </div>

  <div class="sheet-bg" id="sheet-bg" onclick="closeBothSheets()"></div>

  <!-- New Goal Sheet -->
  <div class="sheet" id="new-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-inner">
      <div class="sheet-title">New goal</div>
      <div class="field">
        <label>Goal</label>
        <input type="text" id="ng-name" placeholder="e.g. 10,000 Push-ups">
      </div>
      <div class="field">
        <label>Target</label>
        <input type="number" id="ng-target" value="10000" min="1" inputmode="numeric">
      </div>
      <div class="field">
        <label>Unit</label>
        <div class="unit-pills">
          <button class="unit-pill active" onclick="selectUnit(this,'Reps')">Reps</button>
          <button class="unit-pill" onclick="selectUnit(this,'Days')">Days</button>
          <button class="unit-pill" onclick="selectUnit(this,'Hours')">Hours</button>
          <button class="unit-pill" onclick="selectUnit(this,'Mins')">Mins</button>
        </div>
      </div>
      <div class="field">
        <label>Deadline</label>
        <input type="date" id="ng-deadline">
      </div>
      <div class="btn-row">
        <button class="btn-sec" onclick="closeNewSheet()">Cancel</button>
        <button class="btn-pri" onclick="saveGoal()">Create</button>
      </div>
    </div>
  </div>

  <!-- Detail Sheet -->
  <div class="sheet" id="detail-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-inner">
      <div class="detail-header">
        <h2 id="d-title"></h2>
        <button class="save-btn" onclick="closeDetail()">Save</button>
      </div>
      <div class="detail-progress">
        <div class="d-nums">
          <span class="d-cur" id="d-cur">0</span>
          <span class="d-sep">/</span>
          <span class="d-tot" id="d-tot">0</span>
          <span class="d-unit" id="d-unit"></span>
        </div>
        <div class="d-pct" id="d-pct">0% complete</div>
        <div class="d-deadline" id="d-deadline"></div>
        <div class="d-track"><div class="d-fill" id="d-fill" style="width:0%"></div></div>
      </div>
      <div class="sec-label">Log a session</div>
      <div class="log-form">
        <input type="datetime-local" id="log-dt">
        <input type="number" id="log-reps" min="1" placeholder="Amount" inputmode="numeric">
        <button class="log-add-btn" onclick="addLog()">Add session</button>
      </div>
      <div class="sec-label">Session history</div>
      <div class="log-list" id="log-list"></div>
      <button class="del-goal-btn" onclick="deleteGoal()">Delete this goal</button>
    </div>
  </div>
</div>

<script>
  let goals = JSON.parse(localStorage.getItem('gt-goals') || '[]');
  let activeId = null;
  let selectedUnit = 'Reps';

  function save() { localStorage.setItem('gt-goals', JSON.stringify(goals)); }

  function nowISO() {
    const d = new Date(), p = n => String(n).padStart(2,'0');
    return `${d.getFullYear()}-${p(d.getMonth()+1)}-${p(d.getDate())}T${p(d.getHours())}:${p(d.getMinutes())}`;
  }

  function updateClock() {
    const d = new Date(), p = n => String(n).padStart(2,'0');
    document.getElementById('clock').textContent = p(d.getHours()) + ':' + p(d.getMinutes());
  }
  updateClock(); setInterval(updateClock, 10000);

  function selectUnit(el, unit) {
    selectedUnit = unit;
    document.querySelectorAll('.unit-pill').forEach(p => p.classList.remove('active'));
    el.classList.add('active');
  }

  function openNewSheet() {
    selectedUnit = 'Reps';
    document.querySelectorAll('.unit-pill').forEach((p,i) => p.classList.toggle('active', i===0));
    document.getElementById('sheet-bg').classList.add('show');
    document.getElementById('new-sheet').classList.add('show');
  }

  function closeNewSheet() {
    document.getElementById('new-sheet').classList.remove('show');
    document.getElementById('sheet-bg').classList.remove('show');
  }

  function closeBothSheets() {
    if (activeId !== null) closeDetail(); else closeNewSheet();
  }

  function saveGoal() {
    const name = document.getElementById('ng-name').value.trim();
    if (!name) { document.getElementById('ng-name').focus(); return; }
    const target = parseInt(document.getElementById('ng-target').value) || 10000;
    const deadline = document.getElementById('ng-deadline').value || null;
    goals.push({ id: Date.now(), name, target, unit: selectedUnit, deadline, logs: [] });
    save(); renderGoals(); closeNewSheet();
    document.getElementById('ng-name').value = '';
    document.getElementById('ng-target').value = '10000';
    document.getElementById('ng-deadline').value = '';
  }

  function total(g) { return g.logs.reduce((s,l) => s+l.reps, 0); }

  function fmtDeadline(dl, comp) {
    if (!dl) return '';
    const today = new Date(); today.setHours(0,0,0,0);
    const due = new Date(dl + 'T00:00:00');
    const diff = Math.round((due - today) / 86400000);
    if (comp) return 'Completed';
    if (diff < 0) return `Overdue by ${Math.abs(diff)} day${Math.abs(diff)!==1?'s':''}`;
    if (diff === 0) return 'Due today';
    if (diff === 1) return 'Due tomorrow';
    return `Due ${due.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'})} · ${diff} days left`;
  }

  function isOverdue(dl, comp) {
    if (!dl || comp) return false;
    const today = new Date(); today.setHours(0,0,0,0);
    return new Date(dl + 'T00:00:00') < today;
  }

  function renderGoals() {
    const el = document.getElementById('goals-scroll');
    if (!goals.length) {
      el.innerHTML = `<div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round">
          <circle cx="12" cy="12" r="10"/><path d="M12 8v4l3 3"/>
        </svg>
        <p>No goals yet.<br>Tap <strong>+</strong> to create your first one.</p>
      </div>`; return;
    }
    el.innerHTML = goals.map(g => {
      const done = total(g), pct = Math.min(100, Math.round(done/g.target*100)), comp = done >= g.target;
      const unit = g.unit || 'Reps';
      const last = g.logs.length ? fmtDate(g.logs[g.logs.length-1].ts) : 'No sessions yet';
      const dl = fmtDeadline(g.deadline, comp);
      const overdue = isOverdue(g.deadline, comp);
      return `<div class="goal-card" onclick="openDetail(${g.id})">
        <div class="card-top">
          <span class="card-exercise">${g.name}</span>
          <span class="card-badge ${comp?'done':''}">${comp?'Done':pct+'%'}</span>
        </div>
        ${dl ? `<div class="card-deadline ${overdue?'overdue':''}">${dl}</div>` : ''}
        <div class="card-nums">
          <span class="card-cur">${done.toLocaleString()}</span>
          <span class="card-sep">/</span>
          <span class="card-tot">${g.target.toLocaleString()} ${unit}</span>
        </div>
        <div class="progress-track">
          <div class="progress-fill ${comp?'done':''}" style="width:${pct}%"></div>
        </div>
        <div class="card-meta">Last: ${last}</div>
      </div>`;
    }).join('');
  }

  function openDetail(id) {
    activeId = id;
    document.getElementById('log-dt').value = nowISO();
    document.getElementById('log-reps').value = '';
    renderDetail();
    document.getElementById('sheet-bg').classList.add('show');
    document.getElementById('detail-sheet').classList.add('show');
  }

  function closeDetail() {
    document.getElementById('detail-sheet').classList.remove('show');
    document.getElementById('sheet-bg').classList.remove('show');
    renderGoals(); activeId = null;
  }

  function renderDetail() {
    const g = goals.find(x => x.id === activeId); if (!g) return;
    const done = total(g), pct = Math.min(100, Math.round(done/g.target*100)), comp = done >= g.target;
    const unit = g.unit || 'Reps';
    document.getElementById('d-title').textContent = g.name;
    document.getElementById('d-cur').textContent = done.toLocaleString();
    document.getElementById('d-tot').textContent = g.target.toLocaleString();
    document.getElementById('d-unit').textContent = unit;
    document.getElementById('d-pct').textContent = pct + '% complete';
    document.getElementById('log-reps').placeholder = unit + ' done';
    const dlEl = document.getElementById('d-deadline');
    dlEl.textContent = fmtDeadline(g.deadline, comp);
    dlEl.className = 'd-deadline' + (isOverdue(g.deadline, comp) ? ' overdue' : '');
    const f = document.getElementById('d-fill');
    f.style.width = pct + '%'; f.className = 'd-fill' + (comp ? ' done' : '');
    const list = document.getElementById('log-list');
    if (!g.logs.length) { list.innerHTML = '<div class="no-logs">No sessions yet.</div>'; return; }
    list.innerHTML = [...g.logs].reverse().map((l, ri) => {
      const idx = g.logs.length - 1 - ri;
      return `<div class="log-item">
        <div class="log-item-left">
          <span class="log-reps">+${l.reps.toLocaleString()} ${unit}</span>
          <span class="log-time">${fmtDate(l.ts)}</span>
        </div>
        <button class="log-del" onclick="delLog(${idx})">✕</button>
      </div>`;
    }).join('');
  }

  function addLog() {
    const reps = parseInt(document.getElementById('log-reps').value);
    const dt = document.getElementById('log-dt').value;
    if (!reps || reps < 1) return;
    const g = goals.find(x => x.id === activeId); if (!g) return;
    g.logs.push({ reps, ts: dt ? new Date(dt).getTime() : Date.now() });
    save();
    document.getElementById('log-reps').value = '';
    document.getElementById('log-dt').value = nowISO();
    renderDetail();
  }

  function delLog(idx) {
    const g = goals.find(x => x.id === activeId); if (!g) return;
    g.logs.splice(idx, 1); save(); renderDetail();
  }

  function deleteGoal() {
    if (!confirm('Delete this goal and all its history?')) return;
    goals = goals.filter(x => x.id !== activeId);
    save(); closeDetail();
  }

  function fmtDate(ts) {
    const d = new Date(ts);
    return d.toLocaleDateString(undefined,{day:'numeric',month:'short',year:'numeric'})
      +' · '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
  }

  renderGoals();
</script>
</body>
</html>
